workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: codemagic
    environment:
      xcode: latest
      node: 18
    scripts:
      - npm ci
      - npm install -g @capacitor/cli  
      - npm run build
      - cap sync ios
      - cd ios/App && pod install
      - echo "Checking certificates..."
      - app-store-connect list-certificates
      - echo "Creating certificate..."
      - app-store-connect create-certificate --type IOS_DISTRIBUTION --save || echo "Certificate creation failed"
      - echo "Fetching signing files..."
      - app-store-connect fetch-signing-files app.kvittr --type IOS_APP_STORE --create || echo "Fetch failed"
      - xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
