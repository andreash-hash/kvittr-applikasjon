    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Kvittr",
      "description": "Skann og lagre kvitteringer digitalt. Hold oversikt over garantitid, byttefrist, reklamasjonsrett og gavekort.",
      "url": "https://kvittr.app",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "iOS, Android, Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "NOK"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1"
      },
      "author": {
        "@type": "Organization",
        "name": "Kvittr"
      },
      "inLanguage": "nb",
      "keywords": "kvittering, garanti, reklamasjon, byttelapp, gavekort, forbrukerkjøpsloven, kvitteringsapp"
    }
    </script>

    <!-- FAQ Structured Data for long-tail keywords -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Hvor lenge er en kvittering gyldig?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En kvittering er gyldig så lenge garantitiden eller reklamasjonsfristen varer. I Norge har du 5 års reklamasjonsrett på varer som er ment å vare lenger enn 2 år, ifølge forbrukerkjøpsloven. Kvittr hjelper deg å holde oversikt over alle frister."
          }
        },
        {
          "@type": "Question",
          "name": "Hva er forskjellen på garanti og reklamasjon?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Garanti er en frivillig ordning fra selger eller produsent, mens reklamasjonsrett er lovfestet i forbrukerkjøpsloven. Reklamasjonsfristen er 2 eller 5 år avhengig av varens forventede levetid. Kvittr varsler deg før begge frister utløper."
          }
        },
        {
          "@type": "Question",
          "name": "Hvordan lagre kvitteringer digitalt?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Med Kvittr kan du skanne kvitteringer med mobilkameraet. Appen leser automatisk butikknavn, beløp, dato og produktinfo, og lagrer alt trygt i skyen. Du får varsler før garanti- og byttefrister utløper."
          }
        },
        {
          "@type": "Question",
          "name": "Kan jeg bruke digitale gavekort i en app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja! Kvittr lar deg lagre og holde oversikt over gavekort, inkludert saldo og utløpsdato. Skann gavekortet og ha det alltid tilgjengelig på mobilen."
          }
        }
      ]
    }
    </script>
  </head>
